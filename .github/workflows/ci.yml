name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        nim-version: [stable, devel]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.nim-version == 'devel' }}
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ matrix.nim-version }}

      - name: Install libgeos (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgeos-dev

      - name: Install libgeos (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install geos
          echo "LIBRARY_PATH=$(brew --prefix geos)/lib" >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$(brew --prefix geos)/include" >> $GITHUB_ENV

      - name: Test
        run: nimble test
